services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/db/dev.db
      - JWT_SECRET=change-me-in-production-secret-key-12345
    volumes:
      - db-data:/app/db
    restart: always

volumes:
  db-data:
